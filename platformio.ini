[platformio]
src_dir = tests/internal-eeprom-orp
include_dir = src

[config]
build_flags =
    -D VERSION=1.1.0

src_filter =
    +<*>
    +<../../src/*>

[env:espressif32]
board_build.partitions = huge_app.csv
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
lib_deps = EEPROM
           SPI
           Wire
           git@github.com:ozeroio/OzeroBasics.git#v1.0.0
build_flags =
src_filter =
    +<*>
    +<../../src/*>

[env:uno]
platform = atmelavr
board = uno
